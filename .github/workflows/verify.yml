# Verification gate: lint + a single Ubuntu R CMD check. Full cross-platform
# coverage lives in full-check.yml (on-demand / release tags only).
#
# This is the routine remote gate: it runs on every push to main and on every
# pull request. The .githooks/pre-push hook mirrors these same checks locally as
# defense-in-depth for a fresh clone (see CONTRIBUTING.md).
name: Verify

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      LINTR_ERROR_ON_LINT: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}

  check:
    needs: lint
    runs-on: ubuntu-latest
    name: R CMD check (ubuntu-latest, release)
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          # Fast gate runs a standard check; the strict --as-cran pass lives in
          # full-check.yml (and the local pre-push hook).
          args: '"--no-manual"'
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
