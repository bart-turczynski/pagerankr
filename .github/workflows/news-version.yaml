# Lightweight guard against NEWS/DESCRIPTION version drift.
# The top NEWS.md heading must be either "(development version)" or exactly
# match the DESCRIPTION Version. This catches a stale "(development version)"
# heading left in place at release time (as happened for 1.0.0).
#
# TEMPORARY (GitHub-hosted runners disabled on this account): this check also
# runs in the local .githooks/pre-push gate (see CONTRIBUTING.md). Remote runs
# only on demand or at CRAN-submission prep (release tags 'v*'); since the guard
# exists to catch a stale heading at release time, the tag trigger covers its
# real purpose. To restore per-push/PR remote runs, uncomment the triggers below.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]

name: news-version.yaml

permissions: read-all

jobs:
  news-version:
    runs-on: ubuntu-latest
    name: NEWS/version consistency
    steps:
      - uses: actions/checkout@v7

      - name: Check top NEWS heading matches DESCRIPTION version
        run: |
          set -euo pipefail
          version="$(grep -E '^Version:' DESCRIPTION | head -n1 | sed -E 's/^Version:[[:space:]]*//')"
          # First top-level NEWS heading, e.g. "# pagerankr 1.0.0" or
          # "# pagerankr (development version)". Strip the package-name prefix.
          heading="$(grep -m1 -E '^# ' NEWS.md | sed -E 's/^#[[:space:]]+pagerankr[[:space:]]*//')"
          echo "DESCRIPTION Version : '$version'"
          echo "Top NEWS heading    : '$heading'"
          if [ "$heading" = "(development version)" ] || [ "$heading" = "$version" ]; then
            echo "OK: NEWS heading and version are consistent."
          else
            echo "::error::Top NEWS.md heading ('$heading') is neither '(development version)' nor the DESCRIPTION Version ('$version'). Update NEWS.md before release."
            exit 1
          fi
